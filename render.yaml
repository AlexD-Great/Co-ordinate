services:
  - type: web
    name: co-ordinate
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    disk:
      name: co-ordinate-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: CO_ORDINATE_DATA_DIR
        value: /var/data/co-ordinate
      - key: STORACHA_KEY
        sync: false
      - key: STORACHA_PROOF
        sync: false
